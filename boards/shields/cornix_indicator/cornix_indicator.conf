## use ws2812-spi
CONFIG_SPI=y
# Zephyr 3.5+ : WS2812 driver is auto-selected from the devicetree
# `compatible = "worldsemi,ws2812-spi"` node. Enabling CONFIG_LED_STRIP is
# sufficient; the old CONFIG_WS2812_STRIP knob is deprecated and no longer set.
# CONFIG_WS2812_STRIP=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_WS2812=y
CONFIG_RGBLED_WIDGET_LED_COUNT=2

CONFIG_RGBLED_WIDGET_BRIGHTNESS=64

CONFIG_RGBLED_WIDGET_LED_SHARING=y
